<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmerNemer Clicker Remastered</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .box {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            color: white; /* text color */
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #aaa;
        }

        p1 {
            margin-bottom: 20px;
            color: #aaa;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ff4747;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>EmerNemer Clicker Remastered</h1>
        <p>A remaster of EmerNemer Clicker by EmerNemer on Scratch</p>
        <p>Try it out on my itch.io page</p>
        <button onclick="goToItch()">ENCR's itch.io page</button>
    </div>

    <script>
        function goToItch() {
            window.location.href = "https://kingmikegames.itch.io/encr";
        }
    </script>
</body>
</html>
